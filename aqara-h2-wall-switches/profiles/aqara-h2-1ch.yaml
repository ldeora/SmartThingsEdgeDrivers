name: aqara-h2-1ch
components:
  - id: main
    capabilities:
      - id: button
        version: 1
      - id: powerMeter
        version: 1
      - id: energyMeter
        version: 1
      - id: refresh
        version: 1
      - id: healthCheck
        version: 1
    categories:
      - name: Button
  - id: up
    capabilities:
      - id: button
        version: 1
    categories:
      - name: Button
  - id: down
    capabilities:
      - id: button
        version: 1
    categories:
      - name: Button
preferences:
  - title: LED indicator
    name: ledIndicator
    preferenceType: boolean
    definition:
      default: true
  - title: Flip LED
    name: flipLed
    preferenceType: boolean
    definition:
      default: false
  - title: Power-on mode
    name: powerOnMode
    preferenceType: enumeration
    definition:
      options:
        on: "On"
        previous: "Previous"
        off: "Off"
        inverted: "Inverted"
      default: previous
  - title: Up mode
    name: opModeUp
    preferenceType: enumeration
    definition:
      options:
        relay: "Control relay"
        decoupled: "Decoupled"
      default: relay
  - title: Lock up relay
    name: lockRelayUp
    preferenceType: boolean
    definition:
      default: false
  - title: Down multi-click
    name: multiClickDown
    preferenceType: boolean
    definition:
      default: true
