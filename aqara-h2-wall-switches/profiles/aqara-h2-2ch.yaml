name: aqara-h2-2ch
components:
  - id: main
    capabilities:
      - id: button
        version: 1
      - id: powerMeter
        version: 1
      - id: energyMeter
        version: 1
      - id: refresh
        version: 1
      - id: healthCheck
        version: 1
    categories:
      - name: Button
  - id: left
    capabilities:
      - id: button
        version: 1
    categories:
      - name: Button
  - id: right
    capabilities:
      - id: button
        version: 1
    categories:
      - name: Button
  - id: leftDown
    capabilities:
      - id: button
        version: 1
    categories:
      - name: Button
  - id: rightDown
    capabilities:
      - id: button
        version: 1
    categories:
      - name: Button
preferences:
  - title: LED indicator
    name: ledIndicator
    preferenceType: boolean
    definition:
      default: true
  - title: Flip LED
    name: flipLed
    preferenceType: boolean
    definition:
      default: false
  - title: Power-on mode
    name: powerOnMode
    preferenceType: enumeration
    definition:
      options:
        on: "On"
        previous: "Previous"
        off: "Off"
        inverted: "Inverted"
      default: previous
  - title: Left mode
    name: opModeLeft
    preferenceType: enumeration
    definition:
      options:
        relay: "Control relay"
        decoupled: "Decoupled"
      default: relay
  - title: Right mode
    name: opModeRight
    preferenceType: enumeration
    definition:
      options:
        relay: "Control relay"
        decoupled: "Decoupled"
      default: relay
  - title: Lock left relay
    name: lockRelayLeft
    preferenceType: boolean
    definition:
      default: false
  - title: Lock right relay
    name: lockRelayRight
    preferenceType: boolean
    definition:
      default: false
  - title: Left-down multi-click
    name: multiClickLeftDn
    preferenceType: boolean
    definition:
      default: true
  - title: Right-down multi-click
    name: multiClickRightDn
    preferenceType: boolean
    definition:
      default: true
